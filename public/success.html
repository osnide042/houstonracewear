<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Order confirmed | HRW</title><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif}.page{min-height:100vh;display:grid;place-items:center;padding:25px;background:linear-gradient(135deg,#070707,#252525)}.card{width:min(720px,100%);background:#fff;padding:clamp(30px,7vw,72px);text-align:center}.mark{width:70px;height:70px;border-radius:50%;background:#148a3c;color:#fff;display:grid;place-items:center;font-size:2.2rem;margin:0 auto 20px}h1{font-family:"Barlow Condensed",sans-serif;font-size:clamp(3rem,9vw,6rem);line-height:.85;text-transform:uppercase;margin:0 0 22px}p{color:#555;line-height:1.6}.order{background:#f2f2f0;padding:18px;margin:25px 0;text-align:left}.line{display:flex;justify-content:space-between;gap:20px;padding:8px 0;border-bottom:1px solid #ddd}.btn{display:inline-flex;padding:15px 26px;background:#070707;color:#fff;text-decoration:none;text-transform:uppercase;font-weight:800}</style></head><body><main class="page"><section class="card"><div class="mark">✓</div><h1>Order confirmed</h1><p>Your payment was successful. Stripe will email your receipt and HRW has been notified to prepare the order.</p><div class="order" id="order"><p>Loading confirmation…</p></div><a class="btn" href="/">Return to HRW</a></section></main><script>const id=new URLSearchParams(location.search).get("session_id"),box=document.getElementById("order");if(id){fetch("/api/order-status?session_id="+encodeURIComponent(id)).then(r=>r.json()).then(d=>{if(!d.paid)throw Error();localStorage.removeItem("hrw-cart");box.innerHTML=`<div class="line"><span>Order reference</span><strong>${d.orderReference}</strong></div><div class="line"><span>Amount paid</span><strong>${d.amount}</strong></div><div class="line"><span>Email</span><strong>${d.email}</strong></div>`}).catch(()=>box.innerHTML="<p>Your payment was received. Check your email for the Stripe receipt.</p>")}else box.innerHTML="<p>Check your email for confirmation.</p>";</script></body></html>
