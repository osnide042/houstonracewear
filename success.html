<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order confirmed | HRW</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif}
.page{min-height:100vh;display:grid;place-items:center;padding:25px;background:linear-gradient(135deg,#070707,#252525)}
.card{width:min(720px,100%);background:#fff;padding:clamp(30px,7vw,72px);text-align:center}
.mark{width:70px;height:70px;border-radius:50%;background:#148a3c;color:#fff;display:grid;place-items:center;font-size:2.2rem;margin:0 auto 20px}
h1{font-family:"Barlow Condensed",sans-serif;font-size:clamp(3rem,9vw,6rem);line-height:.85;text-transform:uppercase;margin:0 0 22px}
p{color:#555;line-height:1.6}
.order{background:#f2f2f0;padding:18px;margin:25px 0;text-align:left}
.line{display:flex;justify-content:space-between;gap:20px;padding:8px 0;border-bottom:1px solid #ddd}
.btn{display:inline-flex;padding:15px 26px;background:#070707;color:#fff;text-decoration:none;text-transform:uppercase;font-weight:800}
</style>
</head>
<body>
<main class="page">
<section class="card">
<div class="mark">✓</div>
<h1>Order confirmed</h1>
<p>Your Stripe payment was successful. Stripe will email your receipt and the payment will appear in the HRW Stripe Dashboard.</p>
<div class="order" id="order"><p>Preparing your order confirmation…</p></div>
<a class="btn" href="./index.html">Return to HRW</a>
</section>
</main>
<script>
const box = document.getElementById("order");
const pending = JSON.parse(localStorage.getItem("hrw-pending-order") || "null");

if (pending) {
  box.innerHTML = `
    <div class="line"><span>Product</span><strong>${pending.product || "HRW product"}</strong></div>
    <div class="line"><span>Size</span><strong>${pending.size || "-"}</strong></div>
    <div class="line"><span>Quantity</span><strong>${pending.quantity || 1}</strong></div>
    <div class="line"><span>Reference</span><strong>${pending.reference || "-"}</strong></div>
  `;
  localStorage.removeItem("hrw-cart");
  localStorage.removeItem("hrw-pending-order");
} else {
  box.innerHTML = "<p>Your order has been received. Check your email for the Stripe receipt.</p>";
}
</script>
</body>
</html>
